<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>What I Learned This Week</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&display=swap" rel="stylesheet">
<style>
  :root {
    --serif: "Newsreader", Georgia, serif;
    --sans: "Figtree", system-ui, -apple-system, sans-serif;
    --mono: "JetBrains Mono", "SF Mono", monospace;

    --bg: #FAF9F7;
    --text: #2d2d2d;
    --text-light: #666;
    --brand: #4A90D9;
    --brand-secondary: #7B61FF;
    --border: #D3D3D3;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: var(--serif);
    color: var(--text);
    background: var(--bg);
    -webkit-font-smoothing: antialiased;
  }
  ::selection { background: var(--brand); color: #fff; }

  .hero {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 4rem 2rem;
    max-width: 680px;
    margin: 0 auto;
  }

  .hero h1 {
    font-family: var(--serif);
    font-size: clamp(2.4rem, 6vw, 3.6rem);
    font-weight: 500;
    line-height: 1.15;
    letter-spacing: -0.01em;
    margin-bottom: 1.5rem;
    opacity: 0;
    animation: fadeUp 0.8s ease 0.2s forwards;
  }

  .hero-sub {
    font-family: var(--sans);
    font-size: 1.05rem;
    line-height: 1.7;
    color: var(--text-light);
    max-width: 480px;
    margin-bottom: 2.5rem;
    font-weight: 400;
    opacity: 0;
    animation: fadeUp 0.8s ease 0.45s forwards;
  }

  .btn-read {
    display: inline-block;
    font-family: var(--sans);
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 0.5rem 1.4rem;
    border: 1.5px solid var(--text);
    color: var(--text);
    text-decoration: none;
    transition: background 0.2s, color 0.2s, border-color 0.2s;
    opacity: 0;
    animation: fadeUp 0.8s ease 0.65s forwards;
  }
  .btn-read:hover {
    background: var(--brand);
    border-color: var(--brand);
    color: #fff;
  }
  .btn-read:active { transform: scale(0.98); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 640px) {
    .hero { padding: 3rem 1.5rem; }
  }
</style>
</head>
<body>
<section class="hero">
  <h1>What I Learned This Week</h1>
  <p class="hero-sub">A founder learning tech and mathematics from scratch. Going as deep as possible. Sharing it as simply as possible.</p>
  <a href="articles/" class="btn-read">Read</a>
</section>
</body>
</html>
