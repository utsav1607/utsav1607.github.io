<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Articles — What I Learned This Week</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&display=swap" rel="stylesheet">
<style>
  :root {
    --serif: "Newsreader", Georgia, serif;
    --sans: "Figtree", system-ui, -apple-system, sans-serif;
    --mono: "JetBrains Mono", "SF Mono", monospace;

    --bg: #FAF9F7;
    --text: #2d2d2d;
    --text-light: #666;
    --brand: #4A90D9;
    --brand-secondary: #7B61FF;
    --border: #D3D3D3;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: var(--serif);
    color: var(--text);
    background: var(--bg);
    -webkit-font-smoothing: antialiased;
  }
  ::selection { background: var(--brand); color: #fff; }

  header {
    padding: 2.5rem 2rem 0;
    max-width: 720px;
    margin: 0 auto;
  }
  .back-link {
    font-family: var(--sans);
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-light);
    text-decoration: none;
    transition: color 0.2s;
  }
  .back-link:hover { color: var(--brand); }

  .page {
    max-width: 720px;
    margin: 0 auto;
    padding: 3rem 2rem 6rem;
  }
  .page h1 {
    font-family: var(--serif);
    font-size: clamp(2rem, 5vw, 3rem);
    font-weight: 500;
    line-height: 1.1;
    margin-bottom: 0.6rem;
  }
  .page-sub {
    font-family: var(--sans);
    font-size: 1rem;
    line-height: 1.7;
    color: var(--text-light);
    margin-bottom: 3rem;
  }

  .article {
    display: block;
    text-decoration: none;
    color: var(--text);
    padding: 1.2rem 0;
    border-top: 1px solid var(--border);
  }
  .article:last-child {
    border-bottom: 1px solid var(--border);
  }
  .article-number {
    font-family: var(--sans);
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--text-light);
  }
  .article-title {
    font-family: var(--serif);
    font-size: 1.3rem;
    font-weight: 500;
    line-height: 1.3;
    margin: 0.15rem 0 0.25rem;
    transition: color 0.2s;
  }
  .article:hover .article-title {
    color: var(--brand);
  }
  .article-desc {
    font-family: var(--sans);
    font-size: 0.85rem;
    color: var(--text-light);
    line-height: 1.5;
  }

  @media (max-width: 640px) {
    header { padding: 1.5rem 1.5rem 0; }
    .page { padding: 2rem 1.5rem 4rem; }
  }
</style>
</head>
<body>

<header>
  <a href="../" class="back-link">&larr; Back</a>
</header>

<div class="page">
  <h1>Articles</h1>
  <p class="page-sub">One concept at a time, from the ground up.</p>

  <a href="../01-number-systems/" class="article">
    <div class="article-number">01</div>
    <div class="article-title">How Computers Count &mdash; Binary, Decimal, and Hexadecimal</div>
    <div class="article-desc">The number systems that underpin everything. Why your color codes start with #.</div>
  </a>
</div>

</body>
</html>
